version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: growpal-db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: growpal_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: growpal-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass password123

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: growpal-meilisearch
    restart: always
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    environment:
      MEILI_NO_ANALYTICS: "true"

volumes:
  pg_data:
  redis_data:
  meili_data: